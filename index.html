<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Easter Greeting | Open Your Card</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f8f2e7 0%, #efe2cf 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            padding: 2rem;
            position: relative;
        }

        /* watercolor texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(245, 215, 200, 0.2) 2%, transparent 2.5%),
                              radial-gradient(circle at 75% 85%, rgba(200, 220, 190, 0.2) 1.8%, transparent 2%);
            background-size: 50px 50px, 70px 70px;
            pointer-events: none;
            z-index: 0;
        }

        /* main container */
        .home {
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        /* envelope section */
        .envelope-container {
            background: #fffef7;
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(220, 190, 155, 0.3);
            padding: 2rem;
            text-align: center;
            transition: all 0.4s ease;
        }

        .envelope-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #d68b6e;
            margin-bottom: 1rem;
        }

        .envelope-graphic {
            margin: 2rem auto;
            max-width: 280px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .envelope-graphic:hover {
            transform: scale(1.02);
        }

        .read-btn {
            background: #e4a788;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .read-btn:hover {
            background: #c5714a;
            transform: scale(1.02);
        }

        /* postcard wrapper (hidden initially) */
        .postcard-wrapper {
            display: none;
            animation: fadeSlideUp 0.6s ease-out;
        }

        .postcard-wrapper.show {
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* hide envelope when postcard is shown */
        .envelope-container.hide {
            display: none;
        }

        /* back button */
        .back-btn {
            margin-top: 1.5rem;
            background: #d9c2aa;
            border: none;
            color: #5e3e2c;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #c8af94;
        }

        /* The actual postcard styling (reused from earlier) */
        .postcard {
            position: relative;
            background: #fffef7;
            background-image: radial-gradient(circle at 10% 20%, rgba(249, 240, 225, 0.4) 1px, transparent 1px);
            background-size: 22px 22px;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(220, 190, 155, 0.3);
            padding: 2.5rem 2rem;
        }
        .postcard::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1.5px solid #e3cfb0;
            border-radius: 24px;
            pointer-events: none;
            opacity: 0.7;
        }
        .content { position: relative; z-index: 4; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hoppy-header { font-family: 'Dancing Script', cursive; font-size: 3.4rem; font-weight: 700; background: linear-gradient(135deg, #e4a788, #c5714a); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 0.75rem; }
        .easter-image { max-width: 240px; width: 100%; border-radius: 32px; box-shadow: 0 8px 18px rgba(0,0,0,0.08); margin: 1rem 0; }
        .message { font-size: 1.25rem; background: #fffcf5; padding: 0.8rem 1.8rem; border-radius: 60px; color: #7b5c48; margin: 1rem 0; }
        .closing { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #b48b6a; border-top: 1px dashed #eedbc8; padding-top: 0.7rem; display: inline-block; }
        .flower { position: absolute; width: 44px; height: 44px; pointer-events: none; z-index: 10; }
        .flower svg { width: 100%; height: 100%; }
        .flower-tl { top: 10px; left: 10px; }
        .flower-tr { top: 10px; right: 10px; }
        .flower-bl { bottom: 10px; left: 10px; }
        .flower-br { bottom: 10px; right: 10px; }
        .butterfly { position: absolute; bottom: 20px; right: 20px; width: 40px; animation: floatButterfly 12s infinite alternate; }
        .butterfly svg { animation: wingFlap 0.6s infinite alternate; }
        @keyframes wingFlap { 0% { transform: scaleX(1); } 100% { transform: scaleX(0.7); } }
        @keyframes floatButterfly { 0% { transform: translate(0,0); } 100% { transform: translate(-15px, -10px); } }
        @media (max-width: 620px) { .hoppy-header { font-size: 2.2rem; } .message { font-size: 1rem; } .easter-image { max-width: 180px; } .flower-tl, .flower-tr, .flower-bl, .flower-br { width: 32px; height: 32px; } }
    </style>
</head>
<body>

<div class="home">
    <!-- ENVELOPE SECTION -->
    <div id="envelopeSection" class="envelope-container">
        <div class="envelope-title">✉️ You've got mail!</div>
        <div class="envelope-graphic">
            <svg viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="30" width="180" height="100" rx="12" fill="#FEF3E6" stroke="#D6B88A" stroke-width="2"/>
                <path d="M10 30 L100 85 L190 30" fill="none" stroke="#D6B88A" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M30 130 L70 95 M170 130 L130 95" stroke="#D6B88A" stroke-width="2" stroke-linecap="round"/>
                <circle cx="100" cy="80" r="12" fill="#FADADD" stroke="#E4AA93" stroke-width="1.5"/>
                <text x="100" y="85" text-anchor="middle" font-size="14" fill="#c5714a" font-weight="bold">✝</text>
                <path d="M100 68 L100 92 M88 80 L112 80" stroke="#E4AA93" stroke-width="1.8"/>
            </svg>
        </div>
        <p style="color:#7b5c48; margin-bottom: 1rem;">An Easter greeting is waiting for you.</p>
        <button class="read-btn" id="readBtn">📖 Read</button>
    </div>

    <!-- POSTCARD SECTION (initially hidden) -->
    <div id="postcardWrapper" class="postcard-wrapper">
        <div class="postcard">
            <!-- decorative flowers (same as before) -->
            <div class="flower flower-tl"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="3" fill="#F5C1B6" stroke="#D99E82" stroke-width="0.8"/><circle cx="20" cy="12" r="5" fill="#FADADD" stroke="#E4AA93"/><circle cx="28" cy="20" r="5" fill="#FADADD" stroke="#E4AA93"/><circle cx="20" cy="28" r="5" fill="#FADADD" stroke="#E4AA93"/><circle cx="12" cy="20" r="5" fill="#FADADD" stroke="#E4AA93"/></svg></div>
            <div class="flower flower-tr"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="3" fill="#C7E1D4" stroke="#9FC0B0"/><circle cx="20" cy="12" r="5" fill="#E0F0E8" stroke="#AFC9BB"/><circle cx="28" cy="20" r="5" fill="#E0F0E8" stroke="#AFC9BB"/><circle cx="20" cy="28" r="5" fill="#E0F0E8" stroke="#AFC9BB"/><circle cx="12" cy="20" r="5" fill="#E0F0E8" stroke="#AFC9BB"/></svg></div>
            <div class="flower flower-bl"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="3" fill="#FCE5C2" stroke="#E6C396"/><circle cx="20" cy="12" r="5" fill="#FFEFD6" stroke="#E6C396"/><circle cx="28" cy="20" r="5" fill="#FFEFD6" stroke="#E6C396"/><circle cx="20" cy="28" r="5" fill="#FFEFD6" stroke="#E6C396"/><circle cx="12" cy="20" r="5" fill="#FFEFD6" stroke="#E6C396"/></svg></div>
            <div class="flower flower-br"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="3" fill="#E8D0F0" stroke="#C7AAD5"/><circle cx="20" cy="12" r="5" fill="#F3E8FA" stroke="#D1B3E0"/><circle cx="28" cy="20" r="5" fill="#F3E8FA" stroke="#D1B3E0"/><circle cx="20" cy="28" r="5" fill="#F3E8FA" stroke="#D1B3E0"/><circle cx="12" cy="20" r="5" fill="#F3E8FA" stroke="#D1B3E0"/></svg></div>
            <div class="butterfly"><svg viewBox="0 0 50 50"><path d="M25 25 C15 12,5 15,12 22 C18 28,22 26,25 25Z" fill="#F7C9B3" stroke="#C58C6F"/><path d="M25 25 C35 12,45 15,38 22 C32 28,28 26,25 25Z" fill="#F7C9B3" stroke="#C58C6F"/><path d="M20 28 C12 34,10 40,16 38 C20 36,22 32,20 28Z" fill="#F0D0BA" stroke="#C58C6F"/><path d="M30 28 C38 34,40 40,34 38 C30 36,28 32,30 28Z" fill="#F0D0BA" stroke="#C58C6F"/><ellipse cx="25" cy="28" rx="2" ry="7" fill="#C49A7A"/><path d="M24 21 L19 14 M26 21 L31 14" stroke="#b07d5e"/></svg></div>

            <div class="content">
                <div class="hoppy-header">Hoppy Easter, esubalw! ✝️</div>
                <!-- replaceable image tag (cross placeholder) -->
                <img class="easter-image" src="l.jpg" alt="Easter image (replace with your own)">
                <div class="message">🌅 Wishing you a joyful and bright Easter filled with happiness and sweet treats!<br>He is risen! ✨</div>
                <div class="closing">From, Abenezer 🌸</div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 1.5rem;">
            <button class="back-btn" id="backBtn">← Back to Envelope</button>
        </div>
    </div>
</div>

<script>
    const envelope = document.getElementById('envelopeSection');
    const postcardWrapper = document.getElementById('postcardWrapper');
    const readBtn = document.getElementById('readBtn');
    const backBtn = document.getElementById('backBtn');

    readBtn.addEventListener('click', () => {
        envelope.classList.add('hide');
        postcardWrapper.classList.add('show');
    });

    backBtn.addEventListener('click', () => {
        envelope.classList.remove('hide');
        postcardWrapper.classList.remove('show');
    });
</script>
</body>
</html>
